<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger's</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5efe8;
        }

        /* NAVBAR */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #f1e7dc;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff6600;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
        }

        /* GRID DOS CARDS */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
        }

        /* CARD */
        .card {
            background-color: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .price {
            position: absolute;
            background-color: #ff6600;
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            top: 10px;
            right: 10px;
            font-weight: bold;
        }

        .img-container {
            position: relative;
        }

        .content {
            padding: 15px;
        }

        .content h3 {
            margin: 10px 0;
        }

        .content p {
            font-size: 14px;
            color: #555;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background-color: #f1e7dc;
            color: #ff6600;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #ff6600;
            color: #fff;
        }
    </style>

</head>

<body>

    <header>
        <div class="logo">🍔 BURGER'S</div>
        <nav>
            <a href="#">Menu</a>
            <a href="#">Promoções</a>
            <a href="#">Unidades</a>
        </nav>
    </header>

    <div class="container">

        <!-- CARD 1 -->
        <div class="card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
                <div class="price">R$ 34,90</div>
            </div>
            <div class="content">
                <h3>COMBO 01: O CLÁSSICO</h3>
                <p>Pão brioche, queijo cheddar, bacon, alface e tomate.</p>
                <button onclick="adicionarCarrinho('Clássico', 34.90)">ADICIONAR</button>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" alt="">
                <div class="price">R$ 42,90</div>
            </div>
            <div class="content">
                <h3>COMBO 02: DOUBLE MONSTER</h3>
                <p>Dois hambúrgueres, cheddar, bacon e molho BBQ.</p>
                <button onclick="adicionarCarrinho('Double Monster', 42.90)">ADICIONAR</button>
            </div>
        </div>

        <!-- CARD 3 -->
        <div class="card">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086" alt="">
                <div class="price">R$ 38,90</div>
            </div>
            <div class="content">
                <h3>COMBO 03: VEGGIE</h3>
                <p>Hambúrguer vegetal com queijo e salada.</p>
                <button onclick="adicionarCarrinho('Veggie', 38.90)">ADICIONAR</button>
            </div>
        </div>


    </div>

</body>

</html>
