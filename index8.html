<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .conteudo {
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Meu Site...</h1>
    </header>

    <div class="conteudo">
        <h2>Bem-vindo!</h2>
        <p>Este é um exemplo simples usando header, div e footer.</p>
    </div>

    <footer>
        <p>© 2026 - Todos os direitos reservados</p>
    </footer>

</body>
</html>
